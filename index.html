<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathSolver Pro - Yapay Zeka Matematik Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: #161822;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #23263a;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: #9ca3af;
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #1f2232;
            border: 1px solid #2d314d;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #6366f1;
        }

        button {
            width: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-box {
            margin-top: 25px;
            background-color: #1f2232;
            border-left: 4px solid #6366f1;
            padding: 20px;
            border-radius: 0 10px 10px 0;
            display: none;
        }

        .result-box h3 {
            font-size: 16px;
            color: #6366f1;
            margin-bottom: 10px;
        }

        .result-content {
            font-size: 15px;
            line-height: 1.6;
            color: #e5e7eb;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ MathSolver Pro</h1>
    <p class="subtitle">Soruları samimi dille, adım adım çözen ve sağlamasını yapan akıllı asistan</p>
    
    <div class="input-group">
        <label for="problem">Matematik Sorununu Yaz:</label>
        <textarea id="problem" placeholder="Örn: f(x) = 3x^2 + 5x fonksiyonunun türevi nedir? veya bir integral sorusu yazın..."></textarea>
    </div>

    <button onclick="cozumuGetir()">Soruyu Çöz</button>

    <div class="result-box" id="resultBox">
        <h3>✨ Yapay Zeka Adım Adım Çözümü:</h3>
        <div class="result-content" id="resultContent">Çözüm yükleniyor...</div>
    </div>
</div>

<script>
    function cozumuGetir() {
        const problemInput = document.getElementById('problem').value;
        const resultBox = document.getElementById('resultBox');
        const resultContent = document.getElementById('resultContent');

        if (!problemInput.trim()) {
            alert("Lütfen önce bir soru yaz reis!");
            return;
        }

        resultBox.style.display = "block";
        resultContent.innerText = "Yapay zeka soruyu inceliyor, adım adım çözümü hazırlıyor ve sağlamasını yapıyor... Lütfen bekleyin reis.";

        // API BAĞLANTISI BURAYA GELECEK
        setTimeout(() => {
            resultContent.innerText = "Siten harika şekilde çalışıyor kral! Buraya birazdan ücretsiz Gemini API anahtarını eklediğimizde, yazdığın her soruyu saniyeler içinde samimi bir dille çözecek.";
        }, 2000);
    }
</script>

</body>
</html>
