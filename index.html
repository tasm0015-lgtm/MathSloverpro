<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathSolver Pro - Yapay Zeka Matematik Asistanı</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }
        body { background-color: #0b0c10; color: #c5c6c7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 750px; background: #1f2833; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); border: 1px solid #45f3ff33; }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(45deg, #66fcf1, #45f3ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        p.subtitle { color: #95a5a6; text-align: center; font-size: 15px; margin-bottom: 30px; }
        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 15px; color: #66fcf1; margin-bottom: 10px; font-weight: 500; }
        textarea { width: 100%; height: 140px; background-color: #0b0c10; border: 2px solid #45f3ff33; border-radius: 12px; padding: 18px; color: #fff; font-size: 16px; resize: none; outline: none; }
        textarea:focus { border-color: #66fcf1; box-shadow: 0 0 10px rgba(102, 252, 241, 0.2); }
        button { width: 100%; background: linear-gradient(90deg, #66fcf1, #45f3ff); color: #0b0c10; border: none; padding: 16px; font-size: 17px; font-weight: 700; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(102, 252, 241, 0.2); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 252, 241, 0.4); }
        .result-box { margin-top: 30px; background-color: #0b0c10; border-left: 4px solid #66fcf1; padding: 25px; border-radius: 4px 16px 16px 4px; display: none; }
        .result-box h3 { font-size: 18px; color: #66fcf1; margin-bottom: 15px; }
        .result-content { font-size: 16px; line-height: 1.7; color: #eaeded; white-space: pre-wrap; }
        .section-title { margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #45f3ff; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ MathSolver Pro</h1>
    <p class="subtitle">Soruları samimi dille, adım adım çözen ve sağlamasını yapan akıllı asistan</p>
    
    <div class="input-group">
        <label for="problem">Matematik Sorununu Yaz Reis:</label>
        <textarea id="problem" placeholder="Örn: 3x + 5 = 17 veya türev/integral sorusu yazın..."></textarea>
    </div>

    <button onclick="cozumuGetir()">Soruyu Çöz ve Sağlamasını Yap</button>

    <div class="result-box" id="resultBox">
        <h3>✨ Matematik Öğretmeni Çözümü:</h3>
        <div class="result-content" id="resultContent"></div>
    </div>
</div>

<script>
    async function cozumuGetir() {
        const problemInput = document.getElementById('problem').value;
        const resultBox = document.getElementById('resultBox');
        const resultContent = document.getElementById('resultContent');

        if (!problemInput.trim()) {
            alert("Lütfen önce bir soru yaz reis!");
            return;
        }

        resultBox.style.display = "block";
        resultContent.innerHTML = "<div style='color: #95a5a6;'>Yapay zeka motoru bağlanıyor, hocanın dilinden çözümler hazırlanıyor ve sağlaması yapılıyor... Lütfen bekleyin reis.</div>";

        const promptSystem = `Sen profesyonel, samimi ve öğrenci dostu bir matematik öğretmenisin. Sana gönderilen matematik sorusunu şu kurallara göre çözmelisin: 1) Öğrenciye hitap ederken sıcak ve samimi bir ton kullan (örn: "Reis", "Kral", "Şimdi buraya dikkat et"). 2) Çözümü rastgele formüllerle yığma, tane tane adım adım anlat. 3) En önemlisi: Çözümün en sonuna "🛡️ Sorunun Sağlaması ve Doğrulanması" başlığı aç ve orada yaptığın çözümün sağlamasını yaparak sonucun kesin doğru olduğunu kanıtla. Soru şu reis: ${problemInput}`;

        try {
            // Açık kaynaklı ve şifresiz hızlı AI tüneli
            const response = await fetch('https://open-api.leingod.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer free'
                },
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [{ role: 'user', content: promptSystem }]
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices[0].message.content) {
                let text = data.choices[0].message.content;
                text = text.replace(/### (.*)/g, '<div class="section-title">$1</div>');
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                resultContent.innerHTML = text;
                
                if (window.renderMathInElement) {
                    renderMathInElement(resultContent, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError : false
                    });
                }
            } else {
                resultContent.innerText = "Yapay zeka motoru şu an yoğun reis, birkaç saniye sonra tekrar butona bas.";
            }
        } catch (error) {
            console.error(error);
            resultContent.innerText = "Bağlantıda küçük bir dalgalanma oldu reis, butona tekrar basarsan düzelecektir.";
        }
    }
</script>

</body>
</html>
